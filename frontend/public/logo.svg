<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Gradient for main shape -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gradient for accent -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Subtle shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1E40AF" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="64" ry="64" fill="url(#primaryGradient)" filter="url(#shadow)"/>
  
  <!-- Calendar grid lines (subtle) -->
  <g opacity="0.15" stroke="#FFFFFF" stroke-width="2">
    <!-- Horizontal lines -->
    <line x1="80" y1="180" x2="432" y2="180"/>
    <line x1="80" y1="256" x2="432" y2="256"/>
    <line x1="80" y1="332" x2="432" y2="332"/>
    <line x1="80" y1="408" x2="432" y2="408"/>
    <!-- Vertical lines -->
    <line x1="168" y1="104" x2="168" y2="408"/>
    <line x1="256" y1="104" x2="256" y2="408"/>
    <line x1="344" y1="104" x2="344" y2="408"/>
  </g>
  
  <!-- FY Letters - Modern Bold Style -->
  <g fill="#FFFFFF">
    <!-- F Letter -->
    <path d="
      M 100 140
      L 100 380
      L 148 380
      L 148 280
      L 220 280
      L 220 236
      L 148 236
      L 148 184
      L 235 184
      L 235 140
      Z
    "/>
    
    <!-- Y Letter -->
    <path d="
      M 260 140
      L 320 240
      L 380 140
      L 436 140
      L 348 276
      L 348 380
      L 300 380
      L 300 276
      L 212 140
      Z
    "/>
  </g>
  
  <!-- Checkmark accent (representing task completion) -->
  <g transform="translate(340, 300)">
    <circle cx="50" cy="50" r="45" fill="url(#accentGradient)" opacity="0.95"/>
    <polyline 
      points="25,50 45,70 75,35" 
      fill="none" 
      stroke="#FFFFFF" 
      stroke-width="8" 
      stroke-linecap="round" 
      stroke-linejoin="round"
    />
  </g>
  
  <!-- Small decorative dots representing data/timeline -->
  <g fill="#FFFFFF" opacity="0.6">
    <circle cx="92" cy="104" r="6"/>
    <circle cx="124" cy="104" r="6"/>
    <circle cx="156" cy="104" r="6"/>
  </g>
</svg>
